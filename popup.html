<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base target="_blank" />
    <title>URL sharer</title>
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/sharing.css">
    <link rel="stylesheet" href="css/qr.css">
    <link rel="stylesheet" href="css/recent.css">
    <link rel="stylesheet" href="css/settings.css">
    <script type="module" src="js/popup/index.js"></script>
</head>

<body>
    <div id="popup-container">
        <div class="tab-bar" role="tablist">
            <button class="tab-btn active" data-tab="share" role="tab" aria-selected="true" aria-controls="tab-share"
                id="tab-btn-share">Share</button>
            <button class="tab-btn" data-tab="recent" role="tab" aria-selected="false" aria-controls="tab-recent"
                id="tab-btn-recent">Recent</button>
            <button class="tab-btn" data-tab="settings" role="tab" aria-selected="false" aria-controls="tab-settings"
                id="tab-btn-settings">Settings</button>
        </div>

        <div id="tab-share" class="tab-panel" role="tabpanel" aria-labelledby="tab-btn-share">
            <div id="social-sharing-link-container-layout">
                <!-- Buttons rendered dynamically by js/modules/buttons.js -->
            </div>
            <div class="about-me">
                <a id="review-link" class="hidden" target="_blank">Enjoying URL Sharer? ⭐ Leave a quick review</a>
                <a href="https://github.com/shivarajnaidu/URL-sharer">URL sharer</a> By <a
                    href="https://www.linkedin.com/in/shivarajnaidu/">Yuvaraj V</a>
            </div>
        </div>

        <div id="tab-recent" class="tab-panel hidden" role="tabpanel" aria-labelledby="tab-btn-recent">
            <ul id="recent-list"></ul>
            <p id="recent-empty" class="hidden">No recent shares yet.</p>
            <button id="recent-clear" class="hidden" aria-label="Clear all recent shares">Clear All</button>
        </div>

        <div id="tab-settings" class="tab-panel hidden" role="tabpanel" aria-labelledby="tab-btn-settings">
            <ul id="settings-list"></ul>
            <p class="version-info">Version: <span id="version-number"></span></p>
        </div>
    </div>

</body>

</html>
