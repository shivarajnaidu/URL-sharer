<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <base target="_blank" />
    <title>URL sharer</title>
    <link rel="stylesheet" href="css/sharer.css">
    <script src="js/qrcode.min.js"></script>
    <script src="js/index.js"></script>
</head>

<body>
    <div id="social-sharing-link-container-layout">
        <a class="sharing-buttons" id="url-facebook" title="Share On Facebook"><img decoding="async" src="icons/svg/facebook.svg" alt="Facebook"></a>
        <a class="sharing-buttons" id="url-twitter" title="Share On Twitter"><img decoding="async" src="icons/svg/twitter.svg" alt="Twitter"></a>
        <a class="sharing-buttons" id="url-reddit" title="Share On Reddit"><img decoding="async" src="icons/svg/reddit.svg" alt="Reddit"></a>
        <a class="sharing-buttons" id="url-linkedin" title="Share On Linkedin"><img decoding="async" src="icons/svg/linkedin.svg" alt="LinkedIn"></a>
        <a class="sharing-buttons" id="url-stumbleupon" title="Share On Stumbleupon"><img decoding="async" src="icons/svg/stumbleupon.svg" alt="StumbleUpon"></a>
        <a class="sharing-buttons" id="url-pinterest" title="Share On Pinterest"><img decoding="async" src="icons/svg/pinterest.svg" alt="Pinterest"></a>
        <a class="sharing-buttons" id="url-email" title="Share via email"><img decoding="async" src="icons/svg/email.svg" alt="Email"></a>
        <a class="sharing-buttons" id="url-copy" title="Copy And Share"><img decoding="async" src="icons/svg/copy.svg" alt="Copy"><span>Copied !</span></a>
        <a class="sharing-buttons" id="url-qr" title="Show QR Code"><img decoding="async" src="icons/svg/qrcode.svg" alt="QR Code"></a>

        <div id="qr-overlay" class="qr-overlay hidden">
            <div class="qr-container">
                <canvas id="qr-canvas"></canvas>
                <button id="qr-close">&times;</button>
            </div>
        </div>

        <div class="about-me">
            <a href="https://github.com/shivarajnaidu/URL-sharer">URL sharer</a> By <a
                href="https://www.linkedin.com/in/shivarajnaidu/">Yuvaraj V</a>
        </div>
    </div>

</body>

</html>
